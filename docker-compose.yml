services:
  postgres:
    image: postgres:16-alpine
    container_name: team-task-tracker-postgres
    environment:
      POSTGRES_DB: team_task_tracker
      POSTGRES_USER: team_task_tracker
      POSTGRES_PASSWORD: team_task_tracker
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U team_task_tracker -d team_task_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: team-task-tracker-backend
    environment:
      APP_ENV: development
      BACKEND_PORT: "8080"
      DATABASE_URL: postgres://team_task_tracker:team_task_tracker@postgres:5432/team_task_tracker?sslmode=disable
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: team-task-tracker-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
